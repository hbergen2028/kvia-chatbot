<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kvia — How can we help?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 700px;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    @media (max-width: 520px) {
      .chat-container { max-height: none; border-radius: 0; }
    }

    .chat-header {
      background: #2563eb;
      color: #fff;
      padding: 18px 20px;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.45;
      font-size: 15px;
      word-wrap: break-word;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f0f2f5;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 10px 14px;
      background: #f0f2f5;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      font-size: 15px;
      color: #888;
    }

    .chat-input-area {
      display: flex;
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      gap: 8px;
      flex-shrink: 0;
      background: #fff;
    }

    .chat-input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-area input:focus { border-color: #2563eb; }

    .chat-input-area button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .chat-input-area button:hover { background: #1d4ed8; }
    .chat-input-area button:disabled { background: #93b4f5; cursor: default; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Kvia</div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input-area">
      <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
      <button id="send" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    // Conversation history in Anthropic message format
    let conversationHistory = [];

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
    });

    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typing';
      div.textContent = 'Kvia is typing\u2026';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      appendMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      await callAPI();
    }

    async function callAPI() {
      sendBtn.disabled = true;
      inputEl.disabled = true;
      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        hideTyping();

        if (!res.ok) throw new Error('Request failed');

        const data = await res.json();
        conversationHistory.push({ role: 'assistant', content: data.reply });
        appendMessage('assistant', data.reply);
      } catch (err) {
        hideTyping();
        appendMessage('assistant', 'Sorry, something went wrong. Please try again.');
      } finally {
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    // On page load, send an initial request to get Kvia's greeting
    (async function init() {
      conversationHistory.push({ role: 'user', content: 'Hello' });
      await callAPI();
    })();
  </script>
</body>
</html>
